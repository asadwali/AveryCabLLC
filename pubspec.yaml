name: avery_cab_app
description: Avery Cab LLC - Order Management App

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  uuid: ^4.4.0
  flutter_launcher_icons: ^0.14.4
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  shimmer: ^3.0.0
  flutter_multi_formatter: ^2.13.10

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
